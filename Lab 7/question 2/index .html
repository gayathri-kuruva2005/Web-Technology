<!DOCTYPE html>
<html>
<head>
    <title>Online Book Finder</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>📚 Online Book Finder</h1>
        
        <div id="message"></div>
        
        <div class="controls-section">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search by title...">
                <button onclick="searchBooks()">Search</button>
            </div>
            
            <div class="filter-controls">
                <div class="control-group">
                    <label for="categoryFilter">Category:</label>
                    <select id="categoryFilter">
                        <option value="">All Categories</option>
                        <option value="Programming">Programming</option>
                        <option value="Fiction">Fiction</option>
                        <option value="History">History</option>
                        <option value="Science">Science</option>
                        <option value="Business">Business</option>
                    </select>
                    <button onclick="filterByCategory()">Filter</button>
                </div>
                
                <div class="control-group">
                    <label for="sortBy">Sort by:</label>
                    <select id="sortBy">
                        <option value="">None</option>
                        <option value="price">Price (Low to High)</option>
                        <option value="price-desc">Price (High to Low)</option>
                        <option value="rating">Rating (High to Low)</option>
                        <option value="year">Year (Newest First)</option>
                    </select>
                    <button onclick="sortBooks()">Sort</button>
                </div>
                
                <button class="btn-special" onclick="getTopRated()">⭐ Top Rated Books</button>
                <button class="btn-special" onclick="getAllBooks()">📖 All Books</button>
            </div>
        </div>
        
        <div class="books-section">
            <div id="booksList" class="books-grid"></div>
        </div>
        
        <div class="pagination">
            <button onclick="previousPage()" id="prevBtn">← Previous</button>
            <span id="pageInfo">Page 1</span>
            <button onclick="nextPage()" id="nextBtn">Next →</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
